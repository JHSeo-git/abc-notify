name: Release

on:
  # release:
  #   types:
  #     - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild and upload, e.g. v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs-on: macos-15
            arch: arm64
            artifact-name: abc-notify-native-arm64
          - name: macos-intel
            runs-on: macos-15-intel
            arch: x86_64
            artifact-name: abc-notify-native-x86_64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Runner info
        run: |
          set -euo pipefail
          uname -a
          uname -m

      - name: Build Swift binary
        run: |
          set -euo pipefail
          ./scripts/build-native-release.sh --output "dist/${{ matrix.artifact-name }}"

      - name: Verify architecture binary
        run: |
          set -euo pipefail
          file "dist/${{ matrix.artifact-name }}"
          "dist/${{ matrix.artifact-name }}" version

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error

  publish-release:
    needs: build-native
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            echo "Error: release tag is required"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify version matches VERSION file
        run: |
          set -euo pipefail
          BIN_VERSION=$(tr -d '\r\n' < VERSION)
          TAG_VERSION="${{ steps.release_tag.outputs.tag }}"
          if [[ "$BIN_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: VERSION=\"$BIN_VERSION\" does not match tag $TAG_VERSION"
            exit 1
          fi

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: abc-notify-native-arm64
          path: artifacts/arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: abc-notify-native-x86_64
          path: artifacts/x86_64

      - name: Create universal binary
        run: |
          set -euo pipefail
          ./scripts/build-universal-native.sh \
            --arm64 artifacts/arm64/abc-notify-native-arm64 \
            --x86_64 artifacts/x86_64/abc-notify-native-x86_64 \
            --output dist/abc-notify-native

      - name: Verify universal binary
        run: |
          set -euo pipefail
          file dist/abc-notify-native
          ARCHS="$(lipo -archs dist/abc-notify-native)"
          case "$ARCHS" in
            *arm64*x86_64*|*x86_64*arm64*) ;;
            *)
              echo "Error: expected universal binary with arm64 and x86_64, got: $ARCHS"
              exit 1
              ;;
          esac
          dist/abc-notify-native version

      - name: Verify GitHub release exists
        run: gh release view "${{ steps.release_tag.outputs.tag }}" >/dev/null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        run: |
          set -euo pipefail
          gh release upload "${{ steps.release_tag.outputs.tag }}" \
            dist/abc-notify-native \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Switch to main for Formula update
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B release-formula-update origin/main

      - name: Update Formula sha256
        run: |
          set -euo pipefail
          TAG="${{ steps.release_tag.outputs.tag }}"
          TARBALL_URL="https://github.com/JHSeo-git/abc-notify/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$TARBALL_URL" -o source.tar.gz
          NEW_SHA=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          sed -i '' "s/sha256 \".*\"/sha256 \"${NEW_SHA}\"/" Formula/abc-notify.rb
          rm source.tar.gz

      - name: Commit Formula update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/abc-notify.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Formula sha256 for ${{ steps.release_tag.outputs.tag }}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

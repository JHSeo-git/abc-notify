name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild and upload, e.g. v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs-on: macos-15
            arch: arm64
            artifact-name: abc-notify-native-arm64
          - name: macos-intel
            runs-on: macos-15-intel
            arch: x86_64
            artifact-name: abc-notify-native-x86_64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Runner info
        run: |
          set -euo pipefail
          uname -a
          uname -m

      - name: Build Swift binary
        run: |
          set -euo pipefail
          swift build -c release --product abc-notify-native --disable-sandbox
          mkdir -p dist
          cp .build/release/abc-notify-native "dist/${{ matrix.artifact-name }}"
          chmod +x "dist/${{ matrix.artifact-name }}"

      - name: Verify architecture binary
        run: |
          set -euo pipefail
          file "dist/${{ matrix.artifact-name }}"
          "dist/${{ matrix.artifact-name }}" version

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error

  publish-release:
    needs: build-native
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ -z "$TAG" ]]; then
            echo "Error: release tag is required"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_no_prefix=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches VERSION file
        run: |
          set -euo pipefail
          BIN_VERSION=$(tr -d '\r\n' < VERSION)
          TAG_VERSION="${{ steps.release_tag.outputs.tag }}"
          if [[ "$BIN_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: VERSION=\"$BIN_VERSION\" does not match tag $TAG_VERSION"
            exit 1
          fi

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: abc-notify-native-arm64
          path: artifacts/arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: abc-notify-native-x86_64
          path: artifacts/x86_64

      - name: Wait for GitHub release
        run: |
          set -euo pipefail
          TAG="${{ steps.release_tag.outputs.tag }}"
          for _ in {1..30}; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Error: GitHub release not found for $TAG after waiting" >&2
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Homebrew archives
        run: |
          set -euo pipefail
          mkdir -p dist
          package_archive() {
            local arch="$1"
            local native_path="$2"
            local staging_dir
            staging_dir="$(mktemp -d "${TMPDIR:-/tmp}/abc-notify-homebrew-package.XXXXXX")"
            trap 'rm -rf "$staging_dir"' RETURN

            mkdir -p "${staging_dir}/bin" "${staging_dir}/share/abc-notify"
            cp bin/abc-notify "${staging_dir}/bin/abc-notify"
            cp "$native_path" "${staging_dir}/bin/abc-notify-native"
            cp VERSION "${staging_dir}/share/abc-notify/VERSION"
            chmod +x "${staging_dir}/bin/abc-notify" "${staging_dir}/bin/abc-notify-native"

            tar -C "$staging_dir" -czf "dist/abc-notify_${{ steps.release_tag.outputs.version_no_prefix }}_darwin_${arch}.tar.gz" bin share
          }

          package_archive arm64 artifacts/arm64/abc-notify-native-arm64
          package_archive amd64 artifacts/x86_64/abc-notify-native-x86_64

      - name: Verify packaged archives
        run: |
          set -euo pipefail
          tar -tzf "dist/abc-notify_${{ steps.release_tag.outputs.version_no_prefix }}_darwin_arm64.tar.gz" >/dev/null
          tar -tzf "dist/abc-notify_${{ steps.release_tag.outputs.version_no_prefix }}_darwin_amd64.tar.gz" >/dev/null

      - name: Upload release asset
        run: |
          set -euo pipefail
          gh release upload "${{ steps.release_tag.outputs.tag }}" \
            "dist/abc-notify_${{ steps.release_tag.outputs.version_no_prefix }}_darwin_arm64.tar.gz" \
            "dist/abc-notify_${{ steps.release_tag.outputs.version_no_prefix }}_darwin_amd64.tar.gz" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
